<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAI OR CODE!</title>
    <style>
        .container{
            color: white;
            background-color: grey;
            font-size: 25px;
            height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #weight-guide p {
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom: 5px;">BMI Calculator</h1>
        <form>
            <p><label>Height in CM: </label><input type="text" id="height"></p>
            <p><label>Weight in KG: </label><input type="text" id="weight"></p>
            <button>Calculate</button>
            <br><br>
            <div id="result"></div>
            <div id="weight-guide">
                <h3>BMI Weight guide</h3>
                <p id="under">Under weight = Less than 18.6</p>
                <p id="normal">Normal Range = 18.6 and 24.9</p>
                <p id="over">Overweight = Greater than 24.9</p>
            </div>
        </form>
    </div>
    
</body>
<script>
    const form = document.querySelector("form");
    form.addEventListener("submit", function(e){
        e.preventDefault();
        
        // Reset previous highlights
        document.querySelector("#under").style.backgroundColor = "";
        document.querySelector("#normal").style.backgroundColor = "";
        document.querySelector("#over").style.backgroundColor = "";
        
        const height = parseInt(document.querySelector("#height").value);
        const weight = parseInt(document.querySelector("#weight").value);
        const result = document.querySelector("#result");

        if(height === '' || height < 0 || isNaN(height)){
            result.innerHTML = `Please enter a valid height: ${height}`;
        } else if(weight === '' || weight < 0 || isNaN(weight)){
            result.innerHTML = `Please enter a valid weight: ${weight}`;
        } else {
            const BMI = (weight / ((height * height) / 10000)).toFixed(2);
            result.innerHTML = `<span>Your BMI: ${BMI}</span>`;

            if(BMI < 18.6){
                document.querySelector("#under").style.backgroundColor = "yellow";
                document.querySelector("#under").style.color = "black";
            }
            else if(BMI >= 18.6 && BMI <= 24.9){
                document.querySelector("#normal").style.backgroundColor = "green";
            }
            else if(BMI > 24.9){
                document.querySelector("#over").style.backgroundColor = "red";
            }
        }
    });
</script>
</html>
